name: Run linting

on: workflow_call

jobs:
  lint:
    name: Lint
    runs-on: runs-on,run-id=${{ github.run_id }},job=lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735
        with:
          bundler-cache: true
      - run: bundle exec rubocop